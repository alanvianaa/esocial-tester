name: Build and Release Executables

on:
  release:
    # Aciona o workflow quando uma release é criada (incluindo rascunhos)
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest] # Removido 'macos-latest'
        include:
          - os: ubuntu-latest
            asset_name: eSocial-tester-linux
            asset_path: dist/eSocial-tester
          # - os: macos-latest
          #   asset_name: eSocial-tester-macos
          #   asset_path: dist/eSocial-tester
          - os: windows-latest
            asset_name: eSocial-tester-windows.exe
            asset_path: dist/eSocial-tester.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run PyInstaller build
        run: python build.py

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release upload ${{ github.event.release.tag_name }} "${{ matrix.asset_path }}#${{ matrix.asset_name }}" --clobber
